<!DOCTYPE html>
<html class="light" lang="tr">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Döviz Bütçe Planlayıcı | FinansMatik</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="/js/tailwind-config.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  body { background: #FAFAF7; min-height: 100dvh; }
  .calc-card { box-shadow: 0px 4px 20px rgba(31,41,55,0.04); }
  .result-card { box-shadow: 0px 10px 30px rgba(15,76,76,0.08); border-top: 4px solid #003434; }
  .currency-chip.active { border-color: #0f4c4c; background: rgba(15,76,76,0.1); color: #0f4c4c; }
  .duration-chip.active { border-color: #003434; background: #003434; color: white; }
</style>
</head>
<body class="font-body-md text-on-surface">
<div id="nav-placeholder"></div>
<main class="max-w-[1200px] mx-auto px-4 md:px-10 py-8">
  <header class="mb-8">
    <h1 class="font-headline-lg text-headline-lg-mobile md:text-headline-lg text-primary mb-2">Döviz Bütçe Planlayıcı</h1>
    <p class="font-body-lg text-body-lg text-on-surface-variant max-w-2xl">Birikiminizi döviz bazlı planlayın, hedefe ulaşmak için aylık ne kadar ayırmanız gerektiğini görün.</p>
  </header>
  <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
    <div class="lg:col-span-7 calc-card bg-surface-container-lowest p-8 rounded-xl">
      <div class="space-y-6">
        <div>
          <label class="font-label-md text-label-md text-on-surface-variant block mb-2">Toplam Bütçe (TL)</label>
          <div class="relative flex items-center border-2 border-outline-variant focus-within:border-secondary rounded-xl overflow-hidden">
            <span class="pl-4 pr-2 text-outline font-body-md">₺</span>
            <input class="flex-grow border-none focus:ring-0 font-body-md py-3 pr-4 outline-none" id="totalBudget" placeholder="Örn: 50000" type="number"/>
          </div>
        </div>
        <div>
          <label class="font-label-md text-label-md text-on-surface-variant block mb-2">Hedef Döviz Cinsi</label>
          <div class="flex gap-3" id="currencyGroup">
            <button class="currency-chip active flex-1 border-2 rounded-xl py-3 font-label-md text-center cursor-pointer transition-all" data-currency="USD">USD</button>
            <button class="currency-chip flex-1 border-2 border-outline-variant rounded-xl py-3 font-label-md text-center text-on-surface-variant cursor-pointer hover:border-primary-container/50 transition-all" data-currency="EUR">EUR</button>
            <button class="currency-chip flex-1 border-2 border-outline-variant rounded-xl py-3 font-label-md text-center text-on-surface-variant cursor-pointer hover:border-primary-container/50 transition-all" data-currency="GBP">GBP</button>
          </div>
        </div>
        <div>
          <label class="font-label-md text-label-md text-on-surface-variant block mb-2">Planlanan Süre (Ay)</label>
          <div class="flex gap-2 flex-wrap" id="durationGroup">
            <button class="duration-chip px-5 py-2 rounded-full border font-label-sm cursor-pointer transition-all" data-months="3">3 Ay</button>
            <button class="duration-chip px-5 py-2 rounded-full border font-label-sm cursor-pointer transition-all" data-months="6">6 Ay</button>
            <button class="duration-chip active px-5 py-2 rounded-full font-label-sm cursor-pointer transition-all" data-months="12">12 Ay</button>
            <button class="duration-chip px-5 py-2 rounded-full border font-label-sm cursor-pointer transition-all" data-months="24">24 Ay</button>
            <button class="duration-chip px-5 py-2 rounded-full border font-label-sm cursor-pointer transition-all" data-months="36">36 Ay</button>
          </div>
        </div>
        <button class="w-full bg-[#F4972B] hover:bg-[#e08920] text-white font-headline-md text-headline-md py-4 rounded-xl shadow-lg transition-all active:scale-[0.98]" id="calculateBtn">Hesapla</button>
      </div>
    </div>
    <div class="lg:col-span-5 space-y-6">
      <div class="hidden" id="resultCard">
        <div class="bg-surface-container-lowest rounded-xl result-card p-8">
          <div class="text-center">
            <span class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider">Tahmini Döviz Karşılığı</span>
            <div class="mt-2 flex items-baseline justify-center gap-2">
              <span class="font-display-num text-display-num text-primary" id="fxSymbol">$</span>
              <span class="font-display-num text-display-num text-primary tab-num" id="fxTotal">0</span>
            </div>
          </div>
          <div class="mt-6">
            <div class="bg-surface-container-low p-4 rounded-lg flex items-center justify-between">
              <div>
                <p class="font-label-sm text-label-sm text-on-surface-variant">Aylık Tasarruf Hedefi</p>
                <p class="font-headline-md text-headline-md text-secondary tab-num" id="monthlyTL">0 TL</p>
              </div>
              <span class="material-symbols-outlined text-secondary text-3xl">savings</span>
            </div>
          </div>
        </div>
      </div>
      <div id="loadingPlaceholder" class="bg-surface-container-lowest rounded-xl p-12 text-center">
        <span class="material-symbols-outlined text-4xl text-outline mb-4">currency_exchange</span>
        <p class="text-on-surface-variant">Bütçe tutarı, döviz ve süre seçip hesaplayın.</p>
      </div>
    </div>
  </div>
</main>
<div id="footer-placeholder"></div>
<script src="/js/finansmatik.js"></script>
<script>
  let exchangeRates = [];
  let selectedCurrency = 'USD';
  let selectedMonths = 12;

  FINANSMATIK.api.getExchangeRates().then(data => { exchangeRates = data; });

  document.querySelectorAll('#currencyGroup .currency-chip').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#currencyGroup .currency-chip').forEach(c => c.className = 'currency-chip flex-1 border-2 border-outline-variant rounded-xl py-3 font-label-md text-center text-on-surface-variant cursor-pointer hover:border-primary-container/50 transition-all');
      btn.className = 'currency-chip active flex-1 border-2 rounded-xl py-3 font-label-md text-center cursor-pointer transition-all';
      selectedCurrency = btn.dataset.currency;
    });
  });

  document.querySelectorAll('#durationGroup .duration-chip').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#durationGroup .duration-chip').forEach(c => c.className = 'duration-chip px-5 py-2 rounded-full border border-outline-variant font-label-sm cursor-pointer transition-all');
      btn.className = 'duration-chip active px-5 py-2 rounded-full font-label-sm cursor-pointer transition-all';
      selectedMonths = parseInt(btn.dataset.months);
    });
  });

  document.getElementById('calculateBtn').addEventListener('click', () => {
    const totalTL = parseFloat(document.getElementById('totalBudget').value);
    if (isNaN(totalTL) || totalTL <= 0) return;

    const result = FINANSMATIK.calculate.dovizButce(totalTL, selectedCurrency, selectedMonths, exchangeRates);
    document.getElementById('resultCard').classList.remove('hidden');
    document.getElementById('loadingPlaceholder').classList.add('hidden');

    const symbols = { USD: '$', EUR: '€', GBP: '£', CHF: 'CHF', JPY: '¥' };
    document.getElementById('fxSymbol').textContent = symbols[selectedCurrency] || selectedCurrency;
    document.getElementById('fxTotal').textContent = result.fxTotal.toFixed(2);
    document.getElementById('monthlyTL').textContent = Math.round(result.monthlyTL) + ' TL';
  });
</script>
</body>
</html>
