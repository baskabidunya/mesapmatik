<!DOCTYPE html>
<html class="light" lang="tr">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Mevduat Getirisi Hesaplama | FinansMatik</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="/js/tailwind-config.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  body { background: #FAFAF7; min-height: 100dvh; }
  .card-s { box-shadow: 0px 4px 20px rgba(31,41,55,0.04); }
  .card-r { box-shadow: 0px 10px 30px rgba(15,76,76,0.08); border-top: 4px solid #176969; }
</style>
</head>
<body class="font-body-md text-on-surface">
<div id="nav-placeholder"></div>
<main class="max-w-[1200px] mx-auto px-4 md:px-10 py-8">
  <header class="mb-8">
    <h1 class="font-headline-lg text-headline-lg-mobile md:text-headline-lg text-primary mb-2">Mevduat Getirisi Hesaplama</h1>
    <p class="font-body-lg text-body-lg text-on-surface-variant max-w-2xl">Birikimlerinizin vade sonunda ne kadar kazandıracağını hesaplayın.</p>
  </header>
  <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
    <div class="lg:col-span-5 card-s bg-surface-container-lowest p-8 rounded-xl h-fit">
      <form class="space-y-6" id="depositForm">
        <div>
          <label class="block font-label-md text-label-md text-on-surface-variant mb-2">Anapara (TL)</label>
          <div class="relative">
            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-outline">₺</span>
            <input class="w-full pl-10 pr-4 py-3 border-2 border-outline-variant focus:border-secondary outline-none rounded-xl" id="principal" placeholder="50000" required type="number"/>
          </div>
        </div>
        <div>
          <label class="block font-label-md text-label-md text-on-surface-variant mb-2">Yıllık Faiz Oranı (%)</label>
          <input class="w-full px-4 py-3 border-2 border-outline-variant focus:border-secondary outline-none rounded-xl" id="depositRate" placeholder="Örn: 40" required type="number" step="0.01"/>
        </div>
        <div>
          <label class="block font-label-md text-label-md text-on-surface-variant mb-2">Vade (Gün)</label>
          <select class="w-full px-4 py-3 border-2 border-outline-variant focus:border-secondary outline-none rounded-xl" id="depositTerm">
            <option value="32">32 Gün</option>
            <option value="46">46 Gün</option>
            <option value="92">92 Gün</option>
            <option value="180">180 Gün</option>
            <option value="365" selected>365 Gün</option>
          </select>
        </div>
        <button class="w-full bg-[#F4972B] hover:bg-[#e08924] text-white font-headline-md text-headline-md py-4 rounded-xl shadow-lg transition-all active:scale-[0.98]" type="submit">Hesapla</button>
      </form>
    </div>
    <div class="lg:col-span-7">
      <div class="hidden space-y-6" id="results">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
          <div class="card-r p-6 rounded-xl bg-surface-container-lowest">
            <span class="font-label-sm text-label-sm text-on-surface-variant block mb-2">Net Getiri</span>
            <span class="font-display-num text-display-num text-primary tab-num" id="netReturn">₺0</span>
          </div>
          <div class="card-r p-6 rounded-xl bg-surface-container-lowest" style="border-top-color: #663900;">
            <span class="font-label-sm text-label-sm text-on-surface-variant block mb-2">Brüt Faiz</span>
            <span class="font-display-num text-display-num text-tertiary tab-num" id="grossInterest">₺0</span>
          </div>
          <div class="card-r p-6 rounded-xl bg-surface-container-lowest" style="border-top-color: #F4972B;">
            <span class="font-label-sm text-label-sm text-on-surface-variant block mb-2">Vade Sonu Bakiye</span>
            <span class="font-display-num text-display-num text-[#F4972B] tab-num" id="maturityBalance">₺0</span>
          </div>
        </div>
      </div>
      <div id="loadingPlaceholder" class="bg-surface-container-lowest rounded-xl p-12 text-center">
        <span class="material-symbols-outlined text-4xl text-outline mb-4">savings</span>
        <p class="text-on-surface-variant">Anapara, faiz ve vade bilgilerini girip hesaplayın.</p>
      </div>
    </div>
  </div>
</main>
<div id="footer-placeholder"></div>
<script src="/js/finansmatik.js"></script>
<script>
  document.getElementById('depositForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const anapara = parseFloat(document.getElementById('principal').value);
    const faiz = parseFloat(document.getElementById('depositRate').value);
    const vade = parseInt(document.getElementById('depositTerm').value);
    if (isNaN(anapara) || isNaN(faiz)) return;

    const result = FINANSMATIK.calculate.mevduat(anapara, faiz, vade);
    document.getElementById('results').classList.remove('hidden');
    document.getElementById('loadingPlaceholder').classList.add('hidden');
    document.getElementById('netReturn').textContent = FINANSMATIK.format.currency(result.netFaiz);
    document.getElementById('grossInterest').textContent = FINANSMATIK.format.currency(result.brutFaiz);
    document.getElementById('maturityBalance').textContent = FINANSMATIK.format.currency(result.bilesik);
  });
</script>
</body>
</html>
