<!DOCTYPE html>
<html class="light" lang="tr">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>İletişim | FinansMatik</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="/js/tailwind-config.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  body { background: #FAFAF7; }
</style>
</head>
<body class="font-body-md text-on-surface">
<div id="nav-placeholder"></div>
<main class="max-w-[1200px] mx-auto px-4 md:px-10 py-12">
  <section class="mb-12">
    <h1 class="font-headline-lg text-headline-lg-mobile md:text-headline-lg text-primary mb-4">Bizimle İletişime Geçin</h1>
    <p class="font-body-lg text-body-lg text-on-surface-variant max-w-2xl">Sorularınız, önerileriniz veya talepleriniz için bize ulaşın.</p>
  </section>
  <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
    <div class="lg:col-span-7 bg-surface-container-lowest p-8 rounded-xl border-t-4 border-primary">
      <form class="space-y-6" id="contactForm">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label class="font-label-md text-label-md text-on-surface-variant block mb-2">Ad Soyad</label>
            <input class="w-full px-4 py-3 border-2 border-outline-variant focus:border-secondary outline-none rounded-xl bg-surface" id="fullname" placeholder="Adınız Soyadınız" type="text"/>
          </div>
          <div>
            <label class="font-label-md text-label-md text-on-surface-variant block mb-2">E-posta</label>
            <input class="w-full px-4 py-3 border-2 border-outline-variant focus:border-secondary outline-none rounded-xl bg-surface" id="email" placeholder="ornek@email.com" type="email"/>
          </div>
        </div>
        <div>
          <label class="font-label-md text-label-md text-on-surface-variant block mb-2">Konu</label>
          <input class="w-full px-4 py-3 border-2 border-outline-variant focus:border-secondary outline-none rounded-xl bg-surface" id="subject" placeholder="Mesaj konusu" type="text"/>
        </div>
        <div>
          <label class="font-label-md text-label-md text-on-surface-variant block mb-2">Mesaj</label>
          <textarea class="w-full px-4 py-3 border-2 border-outline-variant focus:border-secondary outline-none rounded-xl bg-surface resize-none" id="message" placeholder="Mesajınız" rows="5"></textarea>
        </div>
        <button class="px-12 py-4 bg-[#F4972B] text-white font-bold rounded-xl shadow-lg hover:shadow-xl active:scale-95 transition-all flex items-center gap-2" type="submit">Gönder</button>
      </form>
    </div>
    <div class="lg:col-span-5 space-y-4">
      <div class="bg-surface-container-high p-6 rounded-xl flex items-start gap-4">
        <span class="material-symbols-outlined text-primary">call</span>
        <div>
          <h3 class="font-label-md text-label-md text-primary font-bold">Telefon</h3>
          <p class="font-body-md text-body-md text-on-surface">+90 (212) 555 00 00</p>
        </div>
      </div>
      <div class="bg-surface-container-high p-6 rounded-xl flex items-start gap-4">
        <span class="material-symbols-outlined text-primary">location_on</span>
        <div>
          <h3 class="font-label-md text-label-md text-primary font-bold">Adres</h3>
          <p class="font-body-md text-body-md text-on-surface">Levent Plaza, Büyükdere Cd. No:123, 34394 Şişli/İstanbul</p>
        </div>
      </div>
    </div>
  </div>
</main>
<div id="footer-placeholder"></div>
<script src="/js/finansmatik.js"></script>
<script>
  document.getElementById('contactForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const btn = e.target.querySelector('button');
    btn.innerHTML = 'Gönderiliyor...';
    btn.style.opacity = '0.7';
    setTimeout(() => {
      btn.innerHTML = 'Başarıyla Gönderildi ✓';
      btn.classList.replace('bg-[#F4972B]', 'bg-green-600');
      e.target.reset();
      setTimeout(() => {
        btn.innerHTML = 'Gönder';
        btn.classList.replace('bg-green-600', 'bg-[#F4972B]');
        btn.style.opacity = '1';
      }, 3000);
    }, 1500);
  });
</script>
</body>
</html>
