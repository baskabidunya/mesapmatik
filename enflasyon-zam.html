<!DOCTYPE html>
<html class="light" lang="tr">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Enflasyon ve Zam Hesaplayıcı | FinansMatik</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="/js/tailwind-config.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  body { background: #FAFAF7; min-height: 100dvh; }
  .calc-card { box-shadow: 0px 4px 20px rgba(31,41,55,0.04); }
  .result-card { box-shadow: 0px 10px 30px rgba(15,76,76,0.08); border-top: 4px solid #176969; }
</style>
</head>
<body class="font-body-md text-on-surface">
<div id="nav-placeholder"></div>
<main class="max-w-[1200px] mx-auto px-4 md:px-10 py-8">
  <header class="mb-8">
    <h1 class="font-headline-lg text-headline-lg-mobile md:text-headline-lg text-primary mb-2">Enflasyon ve Zam Hesaplayıcı</h1>
    <p class="font-body-lg text-body-lg text-on-surface-variant max-w-2xl">Maaşınızın veya bir ürünün fiyatının enflasyon karşısındaki değer kaybını hesaplayın.</p>
  </header>
  <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
    <div class="lg:col-span-5 calc-card bg-surface-container-lowest p-8 rounded-xl h-fit">
      <form class="space-y-6" id="inflationForm">
        <div>
          <label class="block font-label-md text-label-md text-on-surface-variant mb-2">Mevcut Maaş / Fiyat (TL)</label>
          <div class="relative">
            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-outline">₺</span>
            <input class="w-full pl-10 pr-4 py-3 border-2 border-outline-variant focus:border-secondary outline-none rounded-xl font-body-md" id="amount" placeholder="0,00" required step="0.01" type="number"/>
          </div>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block font-label-md text-label-md text-on-surface-variant mb-2">Başlangıç Tarihi</label>
            <input class="w-full px-4 py-3 border-2 border-outline-variant focus:border-secondary outline-none rounded-xl" id="start_date" required type="month"/>
          </div>
          <div>
            <label class="block font-label-md text-label-md text-on-surface-variant mb-2">Bitiş Tarihi</label>
            <input class="w-full px-4 py-3 border-2 border-outline-variant focus:border-secondary outline-none rounded-xl" id="end_date" required type="month"/>
          </div>
        </div>
        <button class="w-full bg-[#F4972B] hover:bg-[#e0861a] text-white font-bold py-4 rounded-xl transition-all active:scale-[0.98] shadow-md flex items-center justify-center gap-2" type="submit">
          <span class="material-symbols-outlined">calculate</span> HESAPLA
        </button>
      </form>
    </div>
    <div class="lg:col-span-7">
      <div class="hidden space-y-6" id="results">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div class="md:col-span-2 bg-surface-container-lowest p-8 rounded-xl result-card">
            <span class="font-label-sm text-label-sm text-secondary uppercase tracking-wider mb-2">Enflasyona Göre Güncel Değer</span>
            <div class="flex items-baseline gap-2">
              <h2 class="font-display-num text-display-num text-primary" id="new_value">₺0</h2>
              <span class="text-on-surface-variant font-body-sm">(Tahmini)</span>
            </div>
          </div>
          <div class="bg-surface-container p-6 rounded-xl">
            <span class="material-symbols-outlined text-error mb-4">trending_up</span>
            <h3 class="font-label-md text-label-md text-on-surface-variant">Enflasyon Farkı</h3>
            <p class="font-headline-md text-headline-md text-error mt-2" id="inflation_diff">₺0</p>
          </div>
          <div class="bg-surface-container p-6 rounded-xl">
            <span class="material-symbols-outlined text-secondary mb-4">equalizer</span>
            <h3 class="font-label-md text-label-md text-on-surface-variant">Reel Değişim</h3>
            <p class="font-headline-md text-headline-md text-secondary mt-2" id="real_change">%0</p>
          </div>
        </div>
      </div>
      <div id="loadingPlaceholder" class="bg-surface-container-lowest rounded-xl p-12 text-center">
        <span class="material-symbols-outlined text-4xl text-outline mb-4">trending_up</span>
        <p class="text-on-surface-variant">Maaş veya fiyat bilgisi ile tarih aralığı seçip hesaplayın.</p>
      </div>
    </div>
  </div>
</main>
<div id="footer-placeholder"></div>
<script src="/js/finansmatik.js"></script>
<script>
  let inflationData = [];
  FINANSMATIK.api.getInflationData().then(data => { inflationData = data; });

  document.getElementById('inflationForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const amount = parseFloat(document.getElementById('amount').value);
    const startDate = document.getElementById('start_date').value;
    const endDate = document.getElementById('end_date').value;
    if (isNaN(amount)) return;

    const result = FINANSMATIK.calculate.enflasyon(amount, startDate, endDate, inflationData);
    document.getElementById('results').classList.remove('hidden');
    document.getElementById('loadingPlaceholder').classList.add('hidden');

    document.getElementById('new_value').textContent = FINANSMATIK.format.currency(result.newValue);
    document.getElementById('inflation_diff').textContent = (result.inflationDiff >= 0 ? '+ ' : '- ') + FINANSMATIK.format.currency(Math.abs(result.inflationDiff));
    document.getElementById('real_change').textContent = (result.realChange >= 0 ? '+' : '') + FINANSMATIK.format.percent(result.realChange);
  });
</script>
</body>
</html>
